name: "Semfora Gate"
description: >-
  Semantic PR gate: checks a pull request against your team's policy in
  semfora.toml (protected domains, load-bearing edits, new cross-module
  dependencies, complexity budgets). Runs entirely inside your runner —
  your code never leaves your infrastructure.
author: "Semfora"
branding:
  icon: "shield"
  color: "purple"

inputs:
  semfora-key:
    description: >-
      Your Semfora license key (from the semfora.ai dashboard). Required —
      the action verifies it before running. Store it as a repository or
      organization secret.
    required: true
  base:
    description: >-
      Base ref/sha to gate against. Defaults to the pull request base sha
      from the workflow event.
    required: false
  target-ref:
    description: 'Target ref (default HEAD; "WORKING" for uncommitted changes).'
    required: false
    default: "HEAD"
  engine-path:
    description: >-
      Path to a pre-provisioned semfora-engine binary (air-gapped runners /
      self-hosted mirrors). When set, no download happens; the license key
      is still verified.
    required: false
  api-url:
    description: "Semfora API base (self-hosted deployments only)."
    required: false
    default: "https://semfora.ai"
  required-reviewers:
    description: >-
      Comma/space-separated GitHub usernames (and org/team slugs, e.g.
      "my-org/platform") to request as reviewers on the PR. Users must be
      contributors on the repo (collaborators) — each entry is validated and
      people without repo access are skipped with a warning. Requires the
      workflow to grant `pull-requests: write`.
    required: false
  request-reviewers-on:
    description: >-
      When to file the review request: "fail" (default — only when the gate
      finds policy errors), "always", or "never".
    required: false
    default: "fail"
  require-approval:
    description: >-
      "true" — a policy failure only passes once one of the required
      reviewers approves the PR at its current head commit (stale approvals
      don't count). "admin" — the approval must come from someone with
      admin permission on the repo. Add the `pull_request_review:
      [submitted]` trigger so the check re-runs when they approve; mark the
      check required in branch protection to make this binding.
    required: false
    default: "false"
  line-comments:
    description: >-
      "true" (default) — post inline review comments on the exact lines the
      policy rules hit (deduplicated across runs; hits outside the diff stay
      in the gate report comment). Requires `pull-requests: write`.
    required: false
    default: "true"
  request-changes:
    description: >-
      "true" (default) — while the policy verdict is fail, keep a Changes
      Requested review on the PR naming the restricted domains, and dismiss
      it automatically once the gate passes or the failure is waived.
      Requires `pull-requests: write`.
    required: false
    default: "true"
  pr-comment:
    description: >-
      Post the gate report as a sticky PR comment (edited in place on each
      run): "on-findings" (default — comment when there are errors or
      warnings, and keep refreshing an existing comment), "always", or
      "never". Requires `pull-requests: write`.
    required: false
    default: "on-findings"
  github-token:
    description: >-
      Token for the reviewer API calls. Defaults to the workflow token;
      only needed explicitly if you want reviewer requests to come from a
      bot/app identity.
    required: false
    default: ${{ github.token }}

outputs:
  verdict:
    description: '"pass" or "fail" — the gate verdict (before any waiver).'
  errors:
    description: "Number of error-severity policy findings."
  warnings:
    description: "Number of warning-severity policy findings."
  waived:
    description: >-
      "true" when a policy failure was waived by a qualified approval of
      the current head commit.
  denied-domains:
    description: >-
      Comma-separated restricted domains hit at error severity (empty when
      none) — the domains that caused a policy denial.

runs:
  using: "node20"
  main: "index.js"
